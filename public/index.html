<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Bar Simplex</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

    <!-- ESQUERDA -->

    <div class="container">

        
        <h1>🍻 Sistema Bar Simplex</h1>

        <div class="acoes-topo">

    <button onclick="calcular()">
        Executar Simplex
    </button>

    <button onclick="
        window.location.href='produtos.html'
    ">
        Cadastrar Produto
    </button>

</div>

<hr>

<div class="acoes-selecao">

    <button onclick="selecionarTodos()">
        Selecionar Todos
    </button>

    <button onclick="desmarcarTodos()">
        Desmarcar Todos
    </button>

</div>
    <hr>

        <h2>Produtos cadastrados</h2>

        <div id="listaProdutos"></div>

    </div>

    <!-- DIREITA -->

    <div class="painel">

        <h2>📊 Resultado</h2>

        <div id="resultado"></div>

        <div id="tabelaSimplex"></div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
