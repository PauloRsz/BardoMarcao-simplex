<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Produtos</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="">

<div class="cadastro">

    <h1>🍻 Cadastro de Produtos</h1>

    <form id="formProduto">

        <input
            type="text"
            id="nome"
            placeholder="Nome"
            required
        >

        <input
            type="number"
            id="custo"
            placeholder="Custo"
        >

        <input
            type="number"
            id="venda"
            placeholder="Venda"
        >

        <input
            type="number"
            id="tempo"
            placeholder="Tempo"
        >

        <input
            type="number"
            id="demanda"
            placeholder="Demanda"
        >

        <button type="submit">
            Salvar
        </button>

    </form>

</div>

<script src="produtos.js"></script>

</body>
</html>
