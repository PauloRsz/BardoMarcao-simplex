<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Editar Produto</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="cadastro">

    <h1>✍ Editar Produto</h1>

    <form id="formProduto">

        <input
            type="text"
            id="nome"
            placeholder="Nome"
            required
        >

        <input
            type="number"
            id="custo"
            placeholder="Custo"
            step="0.01"
        >

        <input
            type="number"
            id="venda"
            placeholder="Venda"
            step="0.01"
        >

        <input
            type="number"
            id="tempo"
            placeholder="Tempo"
            step="0.01"
        >

        <input
            type="number"
            id="demanda"
            placeholder="Demanda"
            step="0.01"
        >

        <div class="acoes-selecao">
            <button type="submit">Salvar alterações</button>
            <button type="button" id="btnCancelar">Cancelar</button>
        </div>

    </form>

</div>

<script src="editar.js"></script>

</body>
</html>
